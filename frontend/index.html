<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompe Ladrillos | Dockerizado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Canvas del juego -->
        <canvas id="gameCanvas" width="700" height="700"></canvas>

        <!-- Overlay centrado para Game Over y botón grande de reinicio -->
        <div id="gameOverOverlay" class="game-over-overlay" aria-hidden="true">
            
            <button id="resetBtn">Reiniciar Juego</button>
        </div>

        <!-- Panel para puntuación y botones secundarios -->
        <div class="ui-panel" role="region" aria-label="Panel de control">
            <p>Puntuación: <span id="score">0</span></p>
            <button id="saveScoreBtn">Guardar Puntuación</button>
            <!-- Botón pequeño de reinicio (opcional) -->
            <a href="docker.html" target="_blank"><button id="resetBtnSmall"  style="background:#00ccff;color:#000000;border-radius:4px;">Documentación Docker</button></a>
        </div>
    </div>

    
    <!-- Archivo JavaScript del juego -->
    <script src="game.js"></script>
</body>
</html>
